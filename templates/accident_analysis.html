<link rel="stylesheet" href="../static/home.css">
<link rel="stylesheet" href="../static/accident_analysis.css">
<script src="../static/api.js"></script>

<div class="aa-page">

  <!-- Search bar + Filter button -->
  <div class="aa-search-row">
    <div class="aa-search-wrap">
      <svg class="aa-search-icon" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="8.5" cy="8.5" r="5.5" stroke="#888" stroke-width="1.8"/>
        <line x1="12.5" y1="12.5" x2="17" y2="17" stroke="#888" stroke-width="1.8" stroke-linecap="round"/>
      </svg>
      <input type="text" id="postcodeInput" class="aa-search-input" placeholder="search postcode">
    </div>
    <button class="aa-filter-btn" id="filterToggle">
      <svg viewBox="0 0 20 20" fill="none" width="14" height="14" xmlns="http://www.w3.org/2000/svg">
        <line x1="3" y1="5"  x2="17" y2="5"  stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
        <line x1="5" y1="10" x2="15" y2="10" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
        <line x1="7" y1="15" x2="13" y2="15" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
      </svg>
      Filter
    </button>
  </div>

  <!-- Filter panel (toggled open/closed) -->
  <div class="aa-filter-panel" id="filterPanel">
    <div class="aa-filter-groups">

      <div class="aa-filter-group">
        <div class="aa-filter-heading" id="lightHeading">Light condition <span class="aa-arrow">▾</span></div>
        <div class="aa-filter-opts" id="lightOpts"></div>
      </div>

      <div class="aa-filter-group">
        <div class="aa-filter-heading" id="atmoHeading">Atmo condition <span class="aa-arrow">▾</span></div>
        <div class="aa-filter-opts" id="atmoOpts"></div>
      </div>

      <div class="aa-filter-group">
        <div class="aa-filter-heading" id="roadHeading">Road condition <span class="aa-arrow">▾</span></div>
        <div class="aa-filter-opts" id="roadOpts"></div>
      </div>

    </div>
    <div class="aa-filter-actions">
      <button class="aa-apply-btn" id="applyFilter">apply</button>
      <button class="aa-cancel-btn" id="cancelFilter">cancel</button>
    </div>
  </div>

  <!-- Accident table -->
  <div class="aa-table-wrap">
    <table class="aa-table">
      <thead>
        <tr>
          <th>Serial No.</th>
          <th>Accident No.</th>
          <th>Light condition</th>
          <th>Road condition</th>
          <th>Atmospheric condition</th>
          <th>Date</th>
          <th>Time</th>
          <th>Road type</th>
          <th>Road intersection</th>
          <th>People involved</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>

  <!-- Charts: pie (left) + line (right) -->
  <div class="aa-charts-row">

    <div class="aa-chart-panel">
      <h3 class="aa-chart-title">Accident by road type</h3>
      <div class="aa-pie-box">
        <canvas id="pieChart"></canvas>
      </div>
    </div>

    <div class="aa-chart-panel">
      <h3 class="aa-chart-title">Accidents trend in the last years</h3>
      <div class="aa-line-wrap">
        <canvas id="lineChart"></canvas>
      </div>
    </div>

  </div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chartjs-plugin-datalabels/2.2.0/chartjs-plugin-datalabels.min.js"></script>
<script>
  Chart.register(ChartDataLabels);

  var colors = [
    '#534AB7', '#1D9E75', '#D85A30', '#185FA5', '#9B8DD4',
    '#E8A838', '#2BBCB0', '#C94040', '#6A8F3C', '#8B4E9E',
    '#3D7ABF', '#E05C8A', '#4BAD6F', '#D4762C', '#5B6BB8',
    '#A63D2F', '#2E9688', '#7B5EA7', '#C4B83A', '#1A7A4A'
  ];
  var activeFilters   = { light: [], atmo: [], road: [] };
  var currentPostcode = '';
  var pieChartInst    = null;
  var lineChartInst   = null;
  var allRows         = [];
  var currentPage     = 1;
  var rowsPerPage     = 50;

  // ── BUILD FILTER UI FROM API DATA ──
  function buildFilterUI(filterOptions) {
    Object.keys(filterOptions).forEach(function(type) {
      var container = document.getElementById(type + 'Opts');
      container.innerHTML = '';
      filterOptions[type].forEach(function(opt) {
        var lbl = document.createElement('label');
        lbl.className = 'aa-check-label';
        lbl.innerHTML = '<input type="checkbox" value="' + opt + '" data-type="' + type + '"> ' + opt;
        container.appendChild(lbl);
      });
    });
  }

  // ── RENDER TABLE ──
  function renderTable(rows) {
    allRows = rows;
    currentPage = 1;
    renderPage();
  }

  function renderPage() {
    var tbody = document.getElementById('tableBody');
    tbody.innerHTML = '';

    if (!allRows.length) {
      tbody.innerHTML = '<tr><td colspan="10" class="aa-no-data">No records found.</td></tr>';
      renderPagination(0);
      return;
    }

    var start    = (currentPage - 1) * rowsPerPage;
    var end      = Math.min(start + rowsPerPage, allRows.length);
    var pageRows = allRows.slice(start, end);

    pageRows.forEach(function(r) {
      var tr = document.createElement('tr');
      tr.innerHTML =
        '<td>' + r.serial                + '</td>' +
        '<td>' + r.ACCIDENT_NO           + '</td>' +
        '<td>' + (r.light        || '—') + '</td>' +
        '<td>' + (r.road         || '—') + '</td>' +
        '<td>' + (r.atmo         || '—') + '</td>' +
        '<td>' + (r.date         || '—') + '</td>' +
        '<td>' + (r.time         || '—') + '</td>' +
        '<td>' + (r.road_type    || '—') + '</td>' +
        '<td>' + (r.intersection || '—') + '</td>' +
        '<td>' + (r.people       || '—') + '</td>';
      tbody.appendChild(tr);
    });

    renderPagination(allRows.length);
  }

  // ── PAGINATION ──
  function renderPagination(totalRows) {
    var existing = document.getElementById('pagination');
    if (existing) existing.remove();

    var totalPages = Math.ceil(totalRows / rowsPerPage);
    if (totalPages <= 1) return;

    var wrap = document.createElement('div');
    wrap.id = 'pagination';
    wrap.className = 'aa-pagination';

    var prev = document.createElement('button');
    prev.textContent = '← Prev';
    prev.className = 'aa-page-btn';
    prev.disabled = currentPage === 1;
    prev.addEventListener('click', function() {
      if (currentPage > 1) { currentPage--; renderPage(); }
    });
    wrap.appendChild(prev);

    for (var i = 1; i <= totalPages; i++) {
      (function(page) {
        var btn = document.createElement('button');
        btn.textContent = page;
        btn.className = 'aa-page-btn' + (page === currentPage ? ' active' : '');
        btn.addEventListener('click', function() { currentPage = page; renderPage(); });
        wrap.appendChild(btn);
      })(i);
    }

    var next = document.createElement('button');
    next.textContent = 'Next →';
    next.className = 'aa-page-btn';
    next.disabled = currentPage === totalPages;
    next.addEventListener('click', function() {
      if (currentPage < totalPages) { currentPage++; renderPage(); }
    });
    wrap.appendChild(next);

    document.querySelector('.aa-table-wrap').after(wrap);
  }

  // ── PIE CHART  ──
function renderPie(pie) {
    // 1. Limita i dati se ci sono troppe categorie (Massimo 10 fette + 1 fette "Other")
    var maxSlices = 10;
    var finalLabels = [];
    var finalValues = [];
    var otherTotal = 0;

    // Ordina i dati dal più grande al più piccolo per un grafico pulito
    var zipped = pie.labels.map((l, i) => ({ label: l, val: pie.values[i] }));
    zipped.sort((a, b) => b.val - a.val);

    zipped.forEach(function(item, idx) {
        if (idx < maxSlices) {
            finalLabels.push(item.label || 'Unknown');
            finalValues.push(item.val);
        } else {
            otherTotal += item.val;
        }
    });

    if (otherTotal > 0) {
        finalLabels.push('Other');
        finalValues.push(otherTotal);
    }

    var total = finalValues.reduce(function(a, b) { return a + b; }, 0);
    var legendEl = document.getElementById('pieLegend');
    if (legendEl) {
        legendEl.innerHTML = '';
        finalLabels.forEach(function(label, i) {
            var item = document.createElement('div');
            item.className = 'aa-pie-legend-item';
            item.innerHTML = '<span class="aa-pie-dot" style="background:' + colors[i % colors.length] + '"></span>' + label;
            legendEl.appendChild(item);
        });
    }

    if (pieChartInst) pieChartInst.destroy();
    
    pieChartInst = new Chart(document.getElementById('pieChart'), {
        type: 'pie',
        data: {
            labels: finalLabels,
            datasets: [{
                data: finalValues,
                backgroundColor: finalLabels.map(function(_, i) { return colors[i % colors.length]; }),
                borderColor: '#fff',
                borderWidth: 2,
                hoverOffset: 10
            }]
        },
        options: {
            responsive: false,
            plugins: {
                datalabels: {
                    display: false 
                },
                legend: { display: false },
                tooltip: {
                    enabled: true,
                    callbacks: {
                        label: function(ctx) {
                            var pct = total > 0 ? Math.round(ctx.parsed / total * 100) : 0;
                            return ctx.label + ': ' + pct + '% (' + ctx.parsed.toLocaleString() + ')';
                        }
                    }
                }
            }
        }
    });
}


  // ── LINE CHART ──
  function renderLine(line) {
    if (lineChartInst) lineChartInst.destroy();
    lineChartInst = new Chart(document.getElementById('lineChart'), {
      type: 'line',
      data: {
        labels: line.labels,
        datasets: [{
          label: 'Accidents',
          data: line.values,
          borderColor: '#534AB7',
          backgroundColor: 'rgba(83,74,183,0.08)',
          tension: 0.4,
          pointRadius: 4,
          pointHoverRadius: 6,
          borderWidth: 2,
          fill: true
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        layout: {
          padding: {
            top: 30
          }
        },
        plugins: {
          legend: { display: false },
          tooltip: {
            enabled: true,
            callbacks: {
              label: function(ctx) {
                return 'Accidents: ' + ctx.parsed.y.toLocaleString();
              }
            }
          },
          datalabels: {
            color: '#534AB7',
            font: { size: 11, weight: '600' },
            anchor: 'end',
            align: 'top',
            clamp: true,
            formatter: function(val) { return val.toLocaleString(); }
          }
        },
        scales: {
          x: { grid: { display: false }, ticks: { color: '#555', font: { size: 12 } } },
          y: { beginAtZero: true, grid: { color: 'rgba(0,0,0,0.06)' }, ticks: { color: '#555' } }
        }
      }
    });
  }

  // ── REFRESH — fetch filtered data ──
  function refresh() {
    var qParams = {};
    if (currentPostcode) qParams.postcode = currentPostcode;
    activeFilters.light.forEach(function(v) { qParams.light = qParams.light || []; qParams.light.push(v); });
    activeFilters.atmo.forEach(function(v)  { qParams.atmo  = qParams.atmo  || []; qParams.atmo.push(v);  });
    activeFilters.road.forEach(function(v)  { qParams.road  = qParams.road  || []; qParams.road.push(v);  });

    fetchJSON('/api/accident-analysis', qParams)
      .then(function(data) {
        renderTable(data.table);
        renderPie(data.pie);
        renderLine(data.line);
      })
      .catch(function(err) {
        console.error('Failed to load accident analysis:', err);
      });
  }

  // ── INIT ──
  fetchJSON('/api/accident-analysis', {})
    .then(function(data) {
      buildFilterUI(data.filter_options);
      renderTable(data.table);
      renderPie(data.pie);
      renderLine(data.line);
    })
    .catch(function(err) {
      console.error('Failed to load initial data:', err);
    });

  // ── FILTER PANEL TOGGLE ──
  document.getElementById('filterToggle').addEventListener('click', function() {
    document.getElementById('filterPanel').classList.toggle('open');
  });

  // ── COLLAPSIBLE CONDITION SECTIONS ──
  ['light', 'atmo', 'road'].forEach(function(type) {
    document.getElementById(type + 'Heading').addEventListener('click', function() {
      var opts  = document.getElementById(type + 'Opts');
      var arrow = this.querySelector('.aa-arrow');
      opts.classList.toggle('open');
      arrow.textContent = opts.classList.contains('open') ? '▴' : '▾';
    });
  });

  // ── APPLY FILTERS ──
  document.getElementById('applyFilter').addEventListener('click', function() {
    activeFilters = { light: [], atmo: [], road: [] };
    document.querySelectorAll('.aa-filter-opts input:checked').forEach(function(cb) {
      activeFilters[cb.dataset.type].push(cb.value);
    });
    document.getElementById('filterPanel').classList.remove('open');
    refresh();
  });

  // ── CANCEL ──
  document.getElementById('cancelFilter').addEventListener('click', function() {
    document.getElementById('filterPanel').classList.remove('open');
  });

  // ── POSTCODE SEARCH ──
  document.getElementById('postcodeInput').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') {
      currentPostcode = this.value.trim();
      refresh();
    }
  });
</script>
