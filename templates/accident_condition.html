<link rel="stylesheet" href="../static/home.css">
<link rel="stylesheet" href="../static/accident_condition.css">

<div class="ac-page">

  <!-- Top section: left controls + right chart -->
  <div class="ac-top">

    <!-- Left panel: search, tabs, icons -->
    <div class="ac-left">

      <!-- Postcode search -->
      <div class="ac-search-wrap">
        <svg class="ac-search-icon" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="8.5" cy="8.5" r="5.5" stroke="#888" stroke-width="1.8"/>
          <line x1="12.5" y1="12.5" x2="17" y2="17" stroke="#888" stroke-width="1.8" stroke-linecap="round"/>
        </svg>
        <input type="text" id="postcodeInput" class="ac-search-input" placeholder="search postcode">
      </div>

      <!-- Condition icons -->
      <div class="ac-icons">

        <!-- Road condition -->
        <div class="ac-icon active" data-condition="road">
          <svg viewBox="0 0 44 44" fill="none" xmlns="http://www.w3.org/2000/svg">
            <polygon points="22,5 41,39 3,39" fill="currentColor"/>
            <rect x="20" y="18" width="4" height="5" rx="1" fill="white"/>
            <rect x="20" y="27" width="4" height="5" rx="1" fill="white"/>
          </svg>
          <span>road con</span>
        </div>

        <!-- Weather condition -->
        <div class="ac-icon" data-condition="weather">
          <svg viewBox="0 0 44 44" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="22" cy="22" r="7" fill="currentColor"/>
            <line x1="22" y1="4"  x2="22" y2="10" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
            <line x1="22" y1="34" x2="22" y2="40" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
            <line x1="4"  y1="22" x2="10" y2="22" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
            <line x1="34" y1="22" x2="40" y2="22" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
            <line x1="9"  y1="9"  x2="13" y2="13" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
            <line x1="31" y1="31" x2="35" y2="35" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
            <line x1="35" y1="9"  x2="31" y2="13" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
            <line x1="13" y1="31" x2="9"  y2="35" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
          </svg>
          <span>weather con</span>
        </div>

        <!-- Light condition -->
        <div class="ac-icon" data-condition="light">
          <svg viewBox="0 0 44 44" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M22 6C16 6 11 11 11 17C11 21 13.2 24.5 16.5 26.5V30H27.5V26.5C30.8 24.5 33 21 33 17C33 11 28 6 22 6Z" fill="currentColor"/>
            <rect x="16.5" y="31" width="11" height="3" rx="1.5" fill="currentColor"/>
            <rect x="18"   y="35" width="8"  height="2" rx="1"   fill="currentColor"/>
          </svg>
          <span>light con</span>
        </div>

      </div>
    </div>

    <!-- Right panel: chart title + canvas -->
    <div class="ac-right">
      <h3 class="ac-chart-title" id="chartTitle">Accident by road condition:</h3>
      <div class="ac-chart-wrap">
        <canvas id="conditionChart"></canvas>
      </div>
      <p class="ac-no-data" id="noDataMsg" style="display:none;">No data found for this postcode.</p>
    </div>

  </div>

  <!-- Table -->
  <div class="ac-table-wrap">
    <table class="ac-table" id="conditionTable">
      <thead>
        <tr>
          <th id="tableColHeader">Surface Type</th>
          <th>Description</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chartjs-plugin-datalabels/2.2.0/chartjs-plugin-datalabels.min.js"></script>
<script src="../static/api.js"></script>
<script>
  Chart.register(ChartDataLabels);

  const COLORS = ['#534AB7', '#1D9E75', '#D85A30', '#185FA5', '#9B8DD4',
                  '#E8A838', '#2BB5A0', '#C74B8A'];

  let currentCondition = 'road';
  let currentPostcode  = '';
  let chartInstance    = null;

  function refresh() {
    API.accidentConditions(currentCondition, currentPostcode)
      .then(function(data) {
        updateChart(data);
        updateTable(data);
      })
      .catch(function(err) {
        console.error('Failed to load condition data:', err);
      });
  }

  function updateChart(data) {
    const canvas = document.getElementById('conditionChart');
    const noMsg  = document.getElementById('noDataMsg');

    if (!data.chart.labels.length) {
      if (chartInstance) { chartInstance.destroy(); chartInstance = null; }
      canvas.style.display = 'none';
      noMsg.style.display  = 'block';
      noMsg.textContent    = 'No data found for postcode "' + currentPostcode + '".';
      return;
    }

    canvas.style.display = 'block';
    noMsg.style.display  = 'none';

    document.getElementById('chartTitle').textContent = data.title;

    if (chartInstance) chartInstance.destroy();

    chartInstance = new Chart(canvas, {
      type: 'bar',
      data: {
        labels: data.chart.labels,
        datasets: [{
          label: 'Number of accidents',
          data:  data.chart.values,
          backgroundColor: data.chart.labels.map((_, i) => COLORS[i % COLORS.length]),
          borderWidth: 0,
          borderRadius: 4
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: {
            display: false
           },
          tooltip:    { enabled: true },
          datalabels: { display: false }
        },
        scales: {
          x: { grid: { display: false }, ticks: { color: '#555', font: { size: 12 } } },
          y: { beginAtZero: true, grid: { color: 'rgba(0,0,0,0.06)' }, ticks: { color: '#555', font: { size: 11 } } }
        }
      }
    });
  }

  function updateTable(data) {
    document.getElementById('tableColHeader').textContent = data.col_header;
    const tbody = document.getElementById('tableBody');
    tbody.innerHTML = '';
    data.table.forEach(function(row) {
      const tr = document.createElement('tr');
      tr.innerHTML = '<td>' + row.label + '</td><td>' + row.description + '</td>';
      tbody.appendChild(tr);
    });
  }

  /* Icon switching — only affects active condition, both chart and table update */
  document.querySelectorAll('.ac-icon').forEach(function(el) {
    el.addEventListener('click', function() {
      document.querySelectorAll('.ac-icon').forEach(function(e) { e.classList.remove('active'); });
      el.classList.add('active');
      currentCondition = el.dataset.condition;
      refresh();
    });
  });

  /* Postcode search — only triggers on Enter, only affects chart */
  document.getElementById('postcodeInput').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') {
      currentPostcode = this.value.trim();
      API.accidentConditions(currentCondition, currentPostcode)
        .then(function(data) { updateChart(data); })
        .catch(function(err) { console.error('Failed to load postcode data:', err); });
    }
  });

  /* Initial load */
  refresh();
</script>
