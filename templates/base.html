<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{PAGE_TITLE}}</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    {{NAVBAR}}

    <main>
        {{PAGE_CONTENT}}
    </main>

    {{FOOTER}}

    <style>
    @keyframes local-spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
    }
    .local-loader-wrap {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        width: 100%;
        height: 100%;
        min-height: 150px;
        color: #555;
        font-family: sans-serif;
    }
    .local-spinner {
        width: 35px;
        height: 35px;
        border: 4px solid #f3f3f3;
        border-top: 4px solid #534AB7;
        border-radius: 50%;
        animation: local-spin 1s linear infinite;
        margin-bottom: 10px;
    }
    </style>

    <script>
    // Global helper to instantly drop a loading wheel inside any target block
    window.Loader = {
        // Simple, bulletproof cursor loading that never breaks layouts or charts
        show: () => {
            document.body.style.cursor = 'wait';
        },
        hide: () => {
            document.body.style.cursor = 'default';
        },

        // Safeguard fallbacks for any text element overrides
        inject: (elementId, message = "Loading...") => {
            const target = document.getElementById(elementId);
            if (target) {
                target.innerHTML = `<div style="padding:10px; font-weight:600; color:#555;">${message}</div>`;
            }
        }
    };

    // ── AUTOMATIC GLOBAL TRIGGERS ──
    // 1. Show loading mouse the exact millisecond a user clicks a tab/link to change pages
    window.addEventListener("beforeunload", () => {
        window.Loader.show();
    });

    // 2. Turn off the loading mouse automatically when the new page finishes opening
    window.addEventListener("DOMContentLoaded", () => {
        window.Loader.hide();
    });
    </script>
</body>
</html>
