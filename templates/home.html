<link rel="stylesheet" href="../static/home.css">

<div class="page-wrapper">

  <!-- Intro box -->
  <div class="intro-banner">
    <h2>On the roads in Victoria: Key updates at a Glanceses</h2>
    <div class="fact-inner" id="factInner">
      <p class="fact-text" id="factText">Loading fact...</p>
    </div>
  </div>

  <!-- 4 Key factors heading - centred with spacing -->
  <h3 class="section-heading">4 Key factors:</h3>

  <!-- 4 stat boxes -->
  <div class="box-container">

    <div class="interactive-box">
      <span class="text-top">58,965</span>
      <span class="text-bottom">Total crashes</span>
    </div>

    <div class="interactive-box">
      <span class="text-top">56</span>
      <span class="text-bottom">Fatalities</span>
    </div>

    <div class="interactive-box">
      <span class="text-top">50 km/h</span>
      <span class="text-bottom">Most common Speed Zone</span>
    </div>

    <div class="interactive-box">
      <span class="text-top">25%</span>
      <span class="text-bottom">Crash during night time</span>
    </div>

  </div>

  <!-- Charts: bar graph (left) and pie chart (right) -->
  <div class="charts-row">

    <!-- Bar chart -->
    <div class="chart-panel" id="bar-graph-panel">
      <h3 class="chart-heading">High-Risk Postcodes</h3>
      <div class="bar-legend"></div>
      <div class="bar-canvas-wrap">
        <canvas id="barChart"></canvas>
      </div>
      <p class="chart-axis-label">accident number</p>
    </div>

    <!-- Pie chart -->
    <div class="chart-panel" id="pie-chart-panel">
      <h3 class="chart-heading">Accidents by vehicle</h3>
      <div class="pie-wrap">
        <div class="pie-box">
          <canvas id="pieChart" width="260" height="260"></canvas>
          <div class="pie-tooltip" id="pieTooltip">
            <b id="tt-name"></b>
            <span id="tt-pct"></span>
          </div>
        </div>
        <div class="pie-legend" id="pieLegend"></div>
      </div>
      <p class="chart-axis-label">accidents by vehicle</p>
    </div>

  </div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chartjs-plugin-datalabels/2.2.0/chartjs-plugin-datalabels.min.js"></script>
<script src="../static/api.js"></script>
<script>
  Chart.register(ChartDataLabels);

  const COLORS = ['#534AB7', '#1D9E75', '#9B8DD4', '#D85A30', '#185FA5',
                  '#E8A838', '#2BB5A0', '#C74B8A', '#6B8E23', '#4682B4'];

  let barChartInstance = null;
  let pieChartInstance = null;

  /* ── Stat boxes ── */
  function updateStats(stats) {
    const boxes  = document.querySelectorAll('.interactive-box .text-top');
    const labels = document.querySelectorAll('.interactive-box .text-bottom');
    boxes[0].textContent  = stats.total_accidents.toLocaleString();
    labels[0].textContent = 'Total crashes';
    boxes[1].textContent  = stats.total_killed.toLocaleString();
    labels[1].textContent = 'Fatalities';
    boxes[2].textContent  = stats.total_serious.toLocaleString();
    labels[2].textContent = 'Serious Injuries';
    boxes[3].textContent  = stats.total_postcodes.toLocaleString();
    labels[3].textContent = 'Postcodes Affected';
  }

  /* ── Bar chart ── */
  function renderBarChart(by_postcode) {
    const colors = by_postcode.labels.map((_, i) => COLORS[i % COLORS.length]);
    document.querySelector('.bar-legend').innerHTML = '';
    if (barChartInstance) barChartInstance.destroy();
    barChartInstance = new Chart(document.getElementById('barChart'), {
      type: 'bar',
      data: {
        labels: by_postcode.labels,
        datasets: [{
          label: 'Accident number',
          data: by_postcode.values,
          backgroundColor: colors,
          borderRadius: 4,
          borderSkipped: false
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: { display: false },
          datalabels: { display: false }
        },
        scales: {
          x: {
            grid: { display: false },
            ticks: { color: '#666', font: { size: 12 } }
          },
          y: {
            ticks: { color: '#666', font: { size: 11 } },
            grid: { color: 'rgba(0,0,0,0.06)' }
          }
        }
      }
    });
  }

  /* ── Pie chart ── */
  function renderPieChart(by_vehicle) {
    const segments = by_vehicle.labels.map((label, i) => ({
      label,
      value: by_vehicle.percentages[i],
      color: COLORS[i % COLORS.length]
    }));

    const legendEl = document.getElementById('pieLegend');
    legendEl.innerHTML = '';
    segments.forEach(function(d) {
      const item = document.createElement('div');
      item.className = 'pie-legend-item';
      item.innerHTML =
        '<span class="pie-legend-sq" style="background:' + d.color + '"></span>' +
        '<span class="pie-legend-lbl">' + d.label + '</span>' +
        '<span class="pie-legend-val">' + d.value + '%</span>';
      legendEl.appendChild(item);
    });

    const pieCanvas = document.getElementById('pieChart');
    const tooltip   = document.getElementById('pieTooltip');
    const ttName    = document.getElementById('tt-name');
    const ttPct     = document.getElementById('tt-pct');

    if (pieChartInstance) pieChartInstance.destroy();

    pieChartInstance = new Chart(pieCanvas, {
      type: 'pie',
      data: {
        labels: segments.map(d => d.label),
        datasets: [{
          data:            segments.map(d => d.value),
          backgroundColor: segments.map(d => d.color),
          borderColor:     '#ffffff',
          borderWidth:     2,
          hoverOffset:     10
        }]
      },
      options: {
        responsive: false,
        plugins: {
          legend:  { display: false },
          tooltip: { enabled: false },
          datalabels: {
            color: '#ffffff',
            font:  { size: 12, weight: '500' },
            formatter: function(val, ctx) {
              return ctx.chart.data.labels[ctx.dataIndex];
            },
            textShadowBlur:  4,
            textShadowColor: 'rgba(0,0,0,0.5)'
          }
        },
        onHover: function(evt, els) {
          if (els.length) {
            const i = els[0].index;
            ttName.textContent = segments[i].label;
            ttPct.textContent  = segments[i].value + '% of total';
            const pr = pieCanvas.parentElement.getBoundingClientRect();
            tooltip.style.left    = (evt.native.clientX - pr.left + 14) + 'px';
            tooltip.style.top     = (evt.native.clientY - pr.top  - 40) + 'px';
            tooltip.style.opacity = '1';
            pieCanvas.style.cursor = 'pointer';
          } else {
            tooltip.style.opacity  = '0';
            pieCanvas.style.cursor = 'default';
          }
        }
      }
    });
  }

  /* ── Fun Facts ── */
  let allFacts = [];
  let currentFactIndex = -1;

  function pickRandomFact() {
    if (allFacts.length === 0) return null;
    let newIndex;
    do {
      newIndex = Math.floor(Math.random() * allFacts.length);
    } while (newIndex === currentFactIndex && allFacts.length > 1);
    currentFactIndex = newIndex;
    return allFacts[currentFactIndex];
  }

  function showFactNow(fact) {
    document.getElementById('factText').textContent = fact.Title_Fact + ' — ' + fact.Fact;
  }

  function displayFact(fact) {
    const inner = document.getElementById('factInner');
    inner.classList.add('fade-out');
    setTimeout(function() {
      document.getElementById('factText').textContent = fact.Title_Fact + ' — ' + fact.Fact;
      inner.classList.remove('fade-out');
    }, 500);
  }

  /* ── Load facts first instantly ── */
  fetch('/api/fun-facts')
    .then(function(res) { return res.json(); })
    .then(function(facts) {
      allFacts = facts;
      const first = pickRandomFact();
      if (first) showFactNow(first);
      setInterval(function() {
        const fact = pickRandomFact();
        if (fact) displayFact(fact);
      }, 5 * 60 * 1000);
    });

  /* ── Load charts and stats separately ── */
  API.home()
    .then(function(data) {
      updateStats(data.stats);
      renderBarChart(data.by_postcode);
      renderPieChart(data.by_vehicle);
    })
    .catch(function(err) {
      console.error('Failed to load home data:', err);
    });

</script>
