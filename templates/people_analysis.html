<link rel="stylesheet" href="../static/people_analysis.css">
<script src="../static/api.js"></script>
<div class="page-wrapper">

    <section class="dashboard-section">
        <h2 class="section-title">Analysis:</h2>
        <div class="section-body">

            <!-- LEFT FILTER -->
            <div class="filter-panel">
                <div class="filter-icon">&#9663; Filter</div>
                <div class="filter-group">
                    
                    <div class="filter-dropdown">
                        <button class="filter-toggle">Injury level <span>&#8964;</span></button>
                        <div class="filter-content">
                            <div class="checkbox-group">
                                <label><input type="checkbox" value="fatal"> fatal</label>
                                <label><input type="checkbox" value="serious"> serious</label>
                                <label><input type="checkbox" value="other injury"> other injury</label>
                                <label><input type="checkbox" value="no injury"> no injury</label>
                            </div>
                        </div>
                    </div>

                    <div class="filter-dropdown">
                        <button class="filter-toggle">Age group <span>&#8964;</span></button>
                        <div class="filter-content">
                            <div class="checkbox-group">
                                <label><input type="checkbox" value="0-4"> 0-4</label>
                                <label><input type="checkbox" value="18-21"> 18-21</label>
                                <label><input type="checkbox" value="70+"> 70+</label>
                                <label><input type="checkbox" value="Unknown"> Unknown</label>
                            </div>
                        </div>
                    </div>

                    <div class="filter-dropdown">
                        <button class="filter-toggle">Light condition <span>&#8964;</span></button>
                        <div class="filter-content">
                            <div class="checkbox-group">
                                <label><input type="checkbox" value="day"> day</label>
                                <label><input type="checkbox" value="dusk/dawn"> dusk/dawn</label>
                                <label><input type="checkbox" value="dark no street light"> dark no street light</label>
                                <label><input type="checkbox" value="..."> ...</label>
                            </div>
                        </div>
                    </div>

                </div>

                <div class="filter-buttons">
                    <button class="btn-apply">apply</button>
                    <button class="btn-cancel">cancel</button>
                </div>
            </div>

            <!-- MAIN CONTENT: TABLE + CHART -->
            <div class="main-content">


                <!-- TABLE -->
                <div class="table-wrapper">
                    <table class="data-table" id="analysisTable">
                        <thead>
                            <tr>
                                <th>Age group <span class="sort-arrow" data-col="0">&#8964;</span></th>
                                <th>Type of person <span class="sort-arrow" data-col="1">&#8964;</span></th>
                                <th>Speed zone <span class="sort-arrow" data-col="2">&#8964;</span></th>
                                <th>Injury rate <span class="sort-arrow" data-col="3">&#8964;</span></th>
                                <th class="col-above">Above average</th>
                                <th>Injury</th>
                            </tr>
                        </thead>
                        <tbody id="tableBody">
                            <tr>
                                <td>18-21</td>
                                <td>Driver</td>
                                <td>100</td>
                                <td>6.4%</td>
                                <td class="above-avg positive">+2.1pp</td>
                                <td>Fatal</td>
                            </tr>
                            <tr class="row-highlight">
                                <td>70+</td>
                                <td>Pedestrian</td>
                                <td>50</td>
                                <td>5.8%</td>
                                <td class="above-avg positive">+1.5pp</td>
                                <td>Fatal</td>
                            </tr>
                            <tr>
                                <td>22-24</td>
                                <td>Passengers</td>
                                <td>50</td>
                                <td>3.9%</td>
                                <td class="above-avg negative">-0.5pp</td>
                                <td>Fatal</td>
                            </tr>
                        </tbody>
                    </table>
                </div>

                <!-- BAR CHART -->
                <div class="chart-area">
                    <div class="chart-legend">
                        <span class="legend-bar-box"></span> Injury rate
                    </div>
                    <div style="position:relative; width:100%; height:220px;">
                        <canvas id="injuryRateChart" role="img" aria-label="Bar chart: Injury rate by age group"></canvas>
                    </div>
                </div>

            </div>
        </div>
    </section>

</div>

<!-- WARNING POPUP -->
<div class="popup-overlay" id="popupOverlay">
    <div class="popup-box" id="popupBox">
        <div class="popup-icon" id="popupIcon">⚠️</div>
        <h3 id="popupTitle">Warning</h3>
        <p id="popupMessage">Only injury level has been selected. Do you want to continue anyway?</p>
        <div class="popup-buttons">
            <button class="btn-popup-confirm" id="btnPopupConfirm">Continue</button>
            <button class="btn-popup-cancel" id="btnPopupCancel">Cancel</button>
        </div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chartjs-plugin-datalabels/2.2.0/chartjs-plugin-datalabels.min.js"></script>
<script>
/* people_analysis.js — DB via API */

Chart.register(ChartDataLabels);

let injuryChart = null;
let currentData = [];

const INJURY_MAP = { "fatal": 1, "serious": 2, "other injury": 3, "no injury": 4 };
const LIGHT_MAP  = { "day": 1, "dusk/dawn": 2, "dark no street light": 3, "...": 9 };

// ── DROPDOWNS ──
document.querySelectorAll(".filter-dropdown").forEach(dd => {
    dd.querySelector(".filter-toggle").addEventListener("click", () => {
        dd.classList.toggle("active");
    });
});

// ── SHOW APPLY/CANCEL ONLY WHEN CHECKED ──
function updateFilterButtons() {
    const panel = document.querySelector(".filter-panel");
    const anyChecked = panel.querySelectorAll("input:checked").length > 0;
    const btns = panel.querySelector(".filter-buttons");
    if (btns) btns.style.display = anyChecked ? "flex" : "none";
}

// Hide ALL filter buttons on load
document.querySelectorAll(".filter-buttons").forEach(b => b.style.display = "none");
document.querySelectorAll(".filter-panel input[type='checkbox']").forEach(cb => {
    cb.addEventListener("change", updateFilterButtons);
});

document.querySelector(".btn-cancel").addEventListener("click", () => {
    document.querySelectorAll(".filter-panel input").forEach(cb => cb.checked = false);
    updateFilterButtons();
    loadAnalysis({});
});

// ── POPUP ──
const overlay      = document.getElementById("popupOverlay");
const popupTitle   = document.getElementById("popupTitle");
const popupMessage = document.getElementById("popupMessage");
const popupIcon    = document.getElementById("popupIcon");
let pendingAction  = null;

function showPopup(type, message, onConfirm) {
    popupTitle.textContent   = type;
    popupMessage.textContent = message;
    popupIcon.textContent    = type === "Warning" ? "⚠️" : "❌";
    overlay.classList.add("visible");
    pendingAction = onConfirm || null;
}

document.getElementById("btnPopupConfirm").addEventListener("click", () => {
    overlay.classList.remove("visible");
    if (pendingAction) { pendingAction(); pendingAction = null; }
});

document.getElementById("btnPopupCancel").addEventListener("click", () => {
    overlay.classList.remove("visible");
    pendingAction = null;
});

// ── COLLECT FILTERS ──
function getFilters() {
    const checked = [...document.querySelectorAll(".filter-panel input:checked")];
    const injuryLevels = checked.filter(cb => INJURY_MAP[cb.value]).map(cb => INJURY_MAP[cb.value]);
    const ageGroups    = checked.filter(cb => ["0-4","18-21","70+","Unknown"].includes(cb.value)).map(cb => cb.value);
    const lightConds   = checked.filter(cb => LIGHT_MAP[cb.value]).map(cb => LIGHT_MAP[cb.value]);
    return { injuryLevels, ageGroups, lightConds };
}

// ── ANALYSIS BUTTON ──
document.getElementById("btnAnalysis").addEventListener("click", () => {
    const { injuryLevels, ageGroups, lightConds } = getFilters();
    const anyChecked = document.querySelectorAll(".filter-panel input:checked").length > 0;

    if (!anyChecked) { loadAnalysis({}); return; }

    if (injuryLevels.length > 0 && ageGroups.length === 0) {
        showPopup("Warning", "Only injury level has been selected. Do you want to continue anyway?",
            () => loadAnalysis({ level: injuryLevels, light: lightConds }));
        return;
    }

    if (ageGroups.length > 0 && injuryLevels.length === 0) {
        showPopup("Error", "Please also select an injury level to run the analysis.");
        return;
    }

    loadAnalysis({ level: injuryLevels, age: ageGroups, light: lightConds });
});

// ── CLEAR BUTTON ──
document.getElementById("btnClear").addEventListener("click", () => {
    document.querySelectorAll(".filter-panel input").forEach(cb => cb.checked = false);
    updateFilterButtons();
    loadAnalysis({});
});

// ── RENDER TABLE ──
function renderTable(data) {
    const tbody = document.getElementById("tableBody");
    if (!data.length) {
        tbody.innerHTML = `<tr><td colspan="6" style="text-align:center;color:#aaa;">No data</td></tr>`;
        return;
    }
    tbody.innerHTML = data.map((r, i) => `
        <tr ${i % 2 === 1 ? 'class="row-highlight"' : ''}>
            <td>${r.age}</td>
            <td>${r.person_type}</td>
            <td>${r.speed_zone}</td>
            <td>${r.injury_rate}%</td>
            <td class="above-avg ${r.above_class}">${r.above}</td>
            <td>Fatal</td>
        </tr>
    `).join("");
}

// ── RENDER CHART ──
function renderChart(data) {
    const ctx = document.getElementById("injuryRateChart").getContext("2d");
    if (injuryChart) injuryChart.destroy();
    injuryChart = new Chart(ctx, {
        type: "bar",
        data: {
            labels: data.map(d => d.age),           // chart has age + injury_rate
            datasets: [{ 
                label: "Injury rate", 
                data: data.map(d => d.injury_rate),
                backgroundColor: "#2e6d8e", 
                borderRadius: 4, 
                borderSkipped: false 
            }]
        },
        options: {
            responsive: true, maintainAspectRatio: false,
            plugins: { legend: { display: false }, datalabels: { display: false } },
            scales: {
                x: { grid: { display: false }, ticks: { color: "#666", font: { size: 12 } } },
                y: { ticks: { color: "#666", font: { size: 11 }, callback: v => v + "%" },
                     grid: { color: "rgba(0,0,0,0.06)" } }
            }
        }
    });
}

// ── SORT ──
document.querySelectorAll(".sort-arrow").forEach(arrow => {
    let asc = true;
    arrow.addEventListener("click", () => {
        const col  = parseInt(arrow.dataset.col);
        const keys = ["age", "person_type", "speed_zone", "injury_rate"];
        const key  = keys[col];
        const sorted = [...currentData].sort((a, b) =>
            typeof a[key] === "number"
                ? asc ? a[key] - b[key] : b[key] - a[key]
                : asc ? String(a[key]).localeCompare(String(b[key]))
                      : String(b[key]).localeCompare(String(a[key]))
        );
        asc = !asc;
        currentData = sorted;
        renderTable(sorted);
        renderChart(sorted);
    });
});

// ── LOAD ──
async function loadAnalysis(filters) {
    try {
        const response = await API.peopleAnalysis(filters);
        currentData = response.table;
        renderTable(response.table);
        renderChart(response.chart);
    } catch (err) {
        console.error("Error loading analysis data:", err);
    }
}

loadAnalysis({});
</script>
